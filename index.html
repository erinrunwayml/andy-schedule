<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Andy — Schedule</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --black: #0a0a0a;
    --white: #ffffff;
    --off-white: #f7f7f7;
    --gray-100: #f0f0f0;
    --gray-200: #e0e0e0;
    --gray-400: #999;
    --gray-600: #555;
    --gray-800: #222;
  }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--white);
    color: var(--black);
    min-height: 100vh;
    max-width: 480px;
    margin: 0 auto;
  }

  /* ── HEADER ── */
  .header {
    background: var(--black);
    color: var(--white);
    padding: 36px 24px 28px;
  }

  .header-eyebrow {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #555;
    margin-bottom: 10px;
  }

  .header-name {
    font-size: 36px;
    font-weight: 300;
    letter-spacing: -0.03em;
    line-height: 1;
    color: var(--white);
    margin-bottom: 4px;
  }

  .header-sub {
    font-size: 13px;
    font-weight: 400;
    color: #555;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid #1a1a1a;
  }

  /* ── BODY ── */
  .body { padding: 0 0 64px; }

  /* ── STATES ── */
  .loading, .empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 24px;
    gap: 12px;
    color: var(--gray-400);
    font-size: 14px;
  }

  .spinner {
    width: 20px; height: 20px;
    border: 1.5px solid var(--gray-200);
    border-top-color: var(--black);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .empty-title {
    font-size: 16px;
    font-weight: 500;
    color: var(--gray-600);
    margin-bottom: 4px;
  }

  /* ── DAY BLOCK ── */
  .day-block {
    opacity: 0;
    animation: up 0.35s ease forwards;
  }
  @keyframes up {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .day-header {
    padding: 28px 24px 14px;
    border-bottom: 1px solid var(--gray-100);
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }

  .day-name {
    font-size: 22px;
    font-weight: 300;
    letter-spacing: -0.02em;
    color: var(--black);
  }

  .day-trip {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--gray-400);
  }

  /* ── HOTEL CONTEXT ── */
  .hotel-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 24px;
    background: var(--off-white);
    border-bottom: 1px solid var(--gray-100);
    font-size: 12px;
    color: var(--gray-400);
  }
  .hotel-row span { font-weight: 500; color: var(--gray-600); }

  /* ── STOPS ── */
  .stops { padding: 0; }

  .stop-item {
    border-bottom: 1px solid var(--gray-100);
  }

  .stop-item:last-child { border-bottom: none; }

  /* Stop inner */
  .stop-inner {
    padding: 20px 24px;
  }

  /* Next stop variant */
  .stop-item.is-next .stop-inner {
    background: var(--off-white);
    border-left: 2px solid var(--gray-200);
    margin-left: 24px;
    padding: 16px 20px;
    border-radius: 0 8px 8px 0;
    margin-bottom: 0;
  }

  /* Stop top row */
  .stop-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 16px;
  }

  .stop-label-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .stop-tag {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    padding: 3px 7px;
    border-radius: 3px;
  }

  .tag-stop {
    background: var(--black);
    color: var(--white);
  }

  .tag-next {
    background: var(--gray-100);
    color: var(--gray-600);
  }

  .stop-person {
    font-size: 12px;
    color: var(--gray-400);
    font-weight: 400;
  }

  .stop-time {
    font-size: 28px;
    font-weight: 300;
    letter-spacing: -0.03em;
    color: var(--black);
    line-height: 1;
  }

  .stop-time.cont {
    font-size: 18px;
    color: var(--gray-400);
    font-weight: 300;
  }

  /* Location rows */
  .loc-block { display: flex; flex-direction: column; gap: 12px; }

  .loc-row { display: flex; gap: 12px; align-items: flex-start; }

  .loc-indicator {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    font-weight: 700;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .ind-up   { background: var(--black); color: var(--white); }
  .ind-down { background: var(--gray-200); color: var(--gray-600); }
  .ind-cont { background: var(--gray-100); color: var(--gray-600); }

  .loc-text { flex: 1; }

  .loc-tag {
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--gray-400);
    margin-bottom: 3px;
  }

  .loc-name {
    font-size: 16px;
    font-weight: 400;
    color: var(--black);
    line-height: 1.3;
    letter-spacing: -0.01em;
  }

  .loc-address {
    font-size: 13px;
    color: var(--gray-400);
    margin-top: 2px;
    line-height: 1.4;
  }

  .loc-note {
    font-size: 12px;
    color: var(--gray-400);
    margin-top: 3px;
    font-style: italic;
  }

  .map-link {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    margin-top: 7px;
    font-size: 12px;
    font-weight: 500;
    color: var(--black);
    text-decoration: none;
    border-bottom: 1px solid var(--gray-200);
    padding-bottom: 1px;
  }

  /* Wait block */
  .wait-block {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    margin-top: 14px;
    padding: 12px 14px;
    background: var(--black);
    border-radius: 6px;
  }

  .wait-dur {
    font-size: 14px;
    font-weight: 500;
    color: var(--white);
    margin-bottom: 2px;
  }

  .wait-note {
    font-size: 12px;
    color: #666;
    line-height: 1.4;
  }

  /* Divider between stops */
  .stop-divider {
    display: flex;
    align-items: center;
    padding: 0 24px;
    height: 1px;
    background: var(--gray-100);
  }

  /* ── CONTACTS ── */
  .contacts {
    padding: 32px 24px 0;
    border-top: 1px solid var(--gray-100);
    margin-top: 24px;
  }

  .contacts-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--gray-400);
    margin-bottom: 16px;
  }

  .contact-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 13px 0;
    border-bottom: 1px solid var(--gray-100);
  }

  .contact-row:last-child { border-bottom: none; }

  .contact-name {
    font-size: 15px;
    font-weight: 400;
    color: var(--black);
  }

  .contact-num {
    font-size: 12px;
    color: var(--gray-400);
    margin-top: 1px;
  }

  .contact-actions { display: flex; gap: 6px; }

  .c-btn {
    font-size: 12px;
    font-weight: 500;
    padding: 7px 16px;
    border-radius: 4px;
    text-decoration: none;
    letter-spacing: 0.01em;
    transition: opacity 0.15s;
  }
  .c-btn:active { opacity: 0.6; }
  .c-text { background: var(--black); color: var(--white); }
  .c-call { background: var(--gray-100); color: var(--black); }

  /* ── FOOTER ── */
  .footer {
    text-align: center;
    padding: 28px 24px 0;
    font-size: 11px;
    color: var(--gray-200);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-eyebrow">Runway · SF Schedule</div>
  <div class="header-name">Andy</div>
  <div class="header-sub" id="headerDate">Loading schedule...</div>
</div>

<div class="body" id="appBody">
  <div class="loading">
    <div class="spinner"></div>
    <div>Loading...</div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://gruugufzdabvovsviunx.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdydXVndWZ6ZGFidm92c3ZpdW54Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEzNTk3OTEsImV4cCI6MjA4NjkzNTc5MX0.SHAS-LfcyxZiHVEpy6lteib2uHjSIxN_ov_PMGnhVxM';

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const CONTACTS = [
  { name: 'Cristóbal', num: '(347) 836-3971', phone: '3478363971' },
  { name: 'Anastasis', num: '(860) 807-5860', phone: '8608075860' },
  { name: 'Alejandro', num: '(347) 784-8050', phone: '3477848050' },
  { name: 'Erin',      num: '(917) 803-5796', phone: '9178035796' },
];

function todayISO() { return new Date().toLocaleDateString('en-CA', { timeZone: 'America/Los_Angeles' }); }

function fmtHeaderDate() {
  return new Date().toLocaleDateString('en-US', {
    weekday: 'long', month: 'long', day: 'numeric', year: 'numeric'
  });
}

function fmtDayName(dateStr) {
  const today = todayISO();
  const tom = new Date(); tom.setDate(tom.getDate() + 1);
  const tomISO = tom.toISOString().split('T')[0];
  if (dateStr === today) return 'Today';
  if (dateStr === tomISO) return 'Tomorrow';
  return new Date(dateStr + 'T12:00:00').toLocaleDateString('en-US', {
    weekday: 'long', month: 'long', day: 'numeric'
  });
}

function mapsUrl(addr) {
  return addr ? `https://maps.google.com/?q=${encodeURIComponent(addr)}` : null;
}

function timeSort(t) {
  if (!t) return '99:99';
  const m = t.match(/(\d{1,2}):?(\d{2})?\s*(AM|PM)?/i);
  if (!m) return '99:99';
  let h = parseInt(m[1]), min = parseInt(m[2] || '0');
  const ap = (m[3] || '').toUpperCase();
  if (ap === 'PM' && h !== 12) h += 12;
  if (ap === 'AM' && h === 12) h = 0;
  return `${String(h).padStart(2,'0')}:${String(min).padStart(2,'0')}`;
}

function renderLoc(icon, cls, tag, name, address, note) {
  const mapUrl = mapsUrl(address);
  return `
    <div class="loc-row">
      <div class="loc-indicator ${cls}">${icon}</div>
      <div class="loc-text">
        <div class="loc-tag">${tag}</div>
        <div class="loc-name">${name || '—'}</div>
        ${address ? `<div class="loc-address">${address}</div>` : ''}
        ${note ? `<div class="loc-note">${note}</div>` : ''}
        ${mapUrl ? `<a href="${mapUrl}" class="map-link" target="_blank">Open in Maps ↗</a>` : ''}
      </div>
    </div>`;
}

function renderStop(stop, index, total) {
  const isNext = stop.afterDropoff === 'wait';
  const isLast = index === total - 1;

  let html = `<div class="stop-item ${isNext ? 'is-next' : ''}">`;
  html += `<div class="stop-inner">`;

  // Top row
  html += `<div class="stop-top">`;
  html += `<div class="stop-label-row">`;
  html += `<span class="stop-tag ${isNext ? 'tag-next' : 'tag-stop'}">${isNext ? 'Next Stop' : `Stop ${index + 1}`}</span>`;
  if (stop.traveler) html += `<span class="stop-person">${stop.traveler}</span>`;
  html += `</div>`;
  if (!isNext && stop.pickupTime) {
    html += `<div class="stop-time">${stop.pickupTime}</div>`;
  } else if (isNext) {
    html += `<div class="stop-time cont">cont.</div>`;
  }
  html += `</div>`; // stop-top

  // Locations
  html += `<div class="loc-block">`;
  if (!isNext) {
    html += renderLoc('↑', 'ind-up', 'Pick up', stop.pickupLocation, stop.pickupAddress, null);
    html += renderLoc('↓', 'ind-down', 'Drop off', stop.dropoffLocation, stop.dropoffAddress, stop.dropoffNote);
  } else {
    html += renderLoc('→', 'ind-cont', 'Continue to', stop.dropoffLocation, stop.dropoffAddress, stop.dropoffNote);
  }
  html += `</div>`;

  // Wait block
  if (isNext && stop.waitMinutes) {
    html += `<div class="wait-block">
      <div>
        <div class="wait-dur">Wait ${stop.waitMinutes} min</div>
        ${stop.waitNote ? `<div class="wait-note">${stop.waitNote}</div>` : ''}
      </div>
    </div>`;
  }

  html += `</div>`; // stop-inner
  html += `</div>`; // stop-item
  return html;
}

function renderDay(day, index) {
  const stops = (day.stops || []).sort((a, b) =>
    timeSort(a.pickupTime).localeCompare(timeSort(b.pickupTime))
  );

  let html = `<div class="day-block" style="animation-delay:${index * 0.07}s">`;

  // Day header
  html += `<div class="day-header">`;
  html += `<div class="day-name">${fmtDayName(day.date)}</div>`;
  if (day.tripName && day.tripName !== 'General') {
    html += `<div class="day-trip">${day.tripName}</div>`;
  }
  html += `</div>`;

  if (stops.length === 0) {
    html += `<div class="loading" style="padding:32px 24px">
      <div style="color:#bbb;font-size:14px">No stops yet</div>
    </div>`;
  } else {
    html += `<div class="stops">`;
    stops.forEach((stop, si) => {
      html += renderStop(stop, si, stops.length);
    });
    html += `</div>`;
  }

  html += `</div>`;
  return html;
}

function renderContacts() {
  let html = `<div class="contacts">`;
  html += `<div class="contacts-label">Contact</div>`;
  CONTACTS.forEach(c => {
    html += `<div class="contact-row">
      <div>
        <div class="contact-name">${c.name}</div>
        <div class="contact-num">${c.num}</div>
      </div>
      <div class="contact-actions">
        <a href="sms:${c.phone}&body=Hi ${c.name.split(' ')[0]}, " class="c-btn c-text">Text</a>
        <a href="tel:${c.phone}" class="c-btn c-call">Call</a>
      </div>
    </div>`;
  });
  html += `</div>`;
  html += `<div class="footer">Runway</div>`;
  return html;
}

async function load() {
  document.getElementById('headerDate').textContent = fmtHeaderDate();

  try {
    const { data, error } = await db
      .from('driver_stops')
      .select('*')
      .gte('date', todayISO())
      .order('date', { ascending: true });

    if (error) throw error;

    const days = (data || []).map(r => ({
      date: r.date,
      tripName: r.trip_name || 'General',
      stops: r.stops || [],
    }));

    const body = document.getElementById('appBody');

    if (days.length === 0) {
      body.innerHTML = `
        <div class="empty">
          <div class="empty-title">Nothing scheduled</div>
          <div>Check back before the next trip</div>
        </div>
        ${renderContacts()}`;
      return;
    }

    let html = '';
    days.forEach((day, i) => { html += renderDay(day, i); });
    html += renderContacts();
    body.innerHTML = html;

  } catch (err) {
    console.error(err);
    document.getElementById('appBody').innerHTML = `
      <div class="empty">
        <div class="empty-title">Couldn't load schedule</div>
        <div>Check your connection and try again</div>
      </div>
      ${renderContacts()}`;
  }
}

load();
</script>
</body>
</html>
